<!-- ============================================================
  粉红 Zine 杂志排版模板
  主题: 粉红Zine | 大胆 · 杂志感 · 不正经但认真
  使用方式: 将下方 <!-- CONTENT --> 部分替换为实际文章内容
  配色: 粉 #ec4899 / 黄 #facc15 / 黑 #18181b
  版本: v1.0 | 2026-06-12
  ============================================================ -->
<section style="box-sizing:border-box;max-width:100%!important;background:#faf6f2;padding:0;font-family:'Inter','PingFang SC','Helvetica Neue',sans-serif;">

  <!-- ═══ 头部 — 巨幅杂志标题 ═══ -->
  <section style="box-sizing:border-box;max-width:100%!important;padding:44px 20px 36px;text-align:center;background:#ffffff;border-bottom:4px solid #ec4899;position:relative;overflow:hidden;">

    <!-- 装饰圆 -->
    <section style="box-sizing:border-box;max-width:100%!important;position:absolute;top:-60px;right:-60px;width:160px;height:160px;background:#fdf2f8;border-radius:50%;opacity:0.6;"></section>
    <section style="box-sizing:border-box;max-width:100%!important;position:absolute;bottom:-30px;left:-40px;width:100px;height:100px;background:#fef9c3;border-radius:50%;opacity:0.5;"></section>

    <!-- 旋转标签 -->
    <section style="box-sizing:border-box;max-width:100%!important;display:inline-block;padding:4px 14px;background:#ec4899;transform:rotate(-3deg);margin-bottom:20px;position:relative;z-index:1;">
      <p style="box-sizing:border-box;max-width:100%!important;margin:0;font-size:11px;font-weight:800;color:#ffffff;letter-spacing:2px;">{TAG}</p>
    </section>

    <!-- 主标题 -->
    <p style="box-sizing:border-box;max-width:100%!important;margin:0 0 8px;font-size:clamp(34px,8vw,50px);font-weight:900;color:#18181b;line-height:1.05;letter-spacing:-0.06em;position:relative;z-index:1;">
      {TITLE_LINE1}<br>{TITLE_LINE2}
    </p>

    <!-- 黄色高亮 -->
    <section style="box-sizing:border-box;max-width:100%!important;display:inline-block;padding:2px 12px;background:#facc15;transform:rotate(1deg);margin:6px auto 16px;position:relative;z-index:1;">
      <p style="box-sizing:border-box;max-width:100%!important;margin:0;font-size:16px;font-weight:700;color:#1a1a1a;letter-spacing:-0.02em;">
        {HIGHLIGHT}
      </p>
    </section>

    <!-- 副标题 -->
    <p style="box-sizing:border-box;max-width:100%!important;margin:0 0 20px;font-size:18px;font-weight:700;color:#18181b;line-height:1.3;letter-spacing:-0.02em;position:relative;z-index:1;">
      {SUB_TITLE}
    </p>

    <!-- 摘要条 -->
    <section style="box-sizing:border-box;max-width:100%!important;display:inline-block;padding:8px 16px;background:#f4f4f5;border-radius:4px;position:relative;z-index:1;">
      <p style="box-sizing:border-box;max-width:100%!important;margin:0;font-size:12px;color:#52525b;line-height:1.5;">
        {SUMMARY}
      </p>
    </section>
  </section>

  <!-- ═══ 正文 ═══ -->
  <section style="box-sizing:border-box;max-width:100%!important;padding:24px 18px 20px;">

    <!-- 引语区块 — 加粗结论 -->
    <section style="box-sizing:border-box;max-width:100%!important;margin:0 0 20px;padding:18px 0 14px;border-bottom:2px dotted #d4d4d8;">
      <p style="box-sizing:border-box;max-width:100%!important;margin:0;font-size:15px;font-weight:700;color:#18181b;line-height:1.7;">
        {LEAD_TEXT}
      </p>
      <p style="box-sizing:border-box;max-width:100%!important;margin:10px 0 0;font-size:14px;color:#52525b;line-height:1.7;">
        {LEAD_SUB}
      </p>
    </section>

    <!-- 正文内容 — 每个章节用以下结构：
         <section style="position:relative;">
           <p style="font-size:72px;font-weight:900;color:#fce7f3;line-height:0.8;position:absolute;top:-10px;left:-6px;z-index:0;pointer-events:none;">NN</p>
           <section style="position:relative;z-index:1;">
             <p style="font-size:20px;font-weight:800;color:#18181b;line-height:1.2;letter-spacing:-0.03em;">章节标题</p>
           </section>
         </section>
    -->
    {BODY}

    <!-- 分隔符 . . . 用于段间 -->
    <!-- <section style="margin:28px 0;text-align:center;"><p style="margin:0;font-size:16px;color:#d4d4d8;letter-spacing:8px;">. . .</p></section> -->

  </section>

  <!-- ═══ 底部 ═══ -->
  <section style="box-sizing:border-box;max-width:100%!important;padding:24px 20px;background:#18181b;text-align:center;">
    <section style="box-sizing:border-box;max-width:100%!important;display:inline-block;padding:2px 10px;background:#ec4899;transform:rotate(-1deg);margin-bottom:12px;">
      <p style="box-sizing:border-box;max-width:100%!important;margin:0;font-size:9px;font-weight:800;color:#ffffff;letter-spacing:2px;">{FOOTER_TAG}</p>
    </section>
    <p style="box-sizing:border-box;max-width:100%!important;margin:0;font-size:11px;color:#a1a1aa;letter-spacing:1px;">{FOOTER_TEXT}</p>
  </section>

</section>
