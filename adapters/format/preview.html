<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>磨稿 · 公众号排版预览</title>
<style>
  :root{
    --bg:#0d0d10; --panel:#141418; --panel2:#1a1a1f;
    --text:#e4e4e7; --dim:#6b6b75; --accent:#f43f5e;
    --border:#222228;
    --font-sys:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;
    --font-mono:'JetBrains Mono','Cascadia Code','SF Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:var(--font-sys); background:var(--bg); color:var(--text);
    display:flex;flex-direction:column; -webkit-font-smoothing:antialiased;
  }

  /* ===== Top Bar ===== */
  .topbar{
    flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
    padding:8px 20px;height:44px;border-bottom:1px solid var(--border);
    background:rgba(20,20,24,.8);backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);z-index:50;
  }
  .topbar-left{display:flex;align-items:center;gap:20px;}
  .logo{font-size:14px;font-weight:800;letter-spacing:1px;user-select:none;}
  .logo span{color:var(--accent);}
  .topbar-right{display:flex;align-items:center;gap:10px;}

  /* Width switcher in topbar */
  .width-switch{display:flex;gap:1px;background:var(--panel2);border-radius:6px;padding:2px;border:1px solid var(--border);}
  .width-switch button{
    padding:4px 10px;border:none;background:transparent;font-size:10px;
    font-family:var(--font-sys);cursor:pointer;color:var(--dim);border-radius:4px;
    transition:all .18s ease;font-weight:500;white-space:nowrap;
  }
  .width-switch button.active{background:var(--accent);color:#fff;font-weight:700;}

  .hint{font-size:10px;color:var(--dim);letter-spacing:.5px;border:1px solid var(--border);padding:3px 8px;border-radius:4px;}
  .hint kbd{font-family:var(--font-mono);font-size:9.5px;color:#a1a1aa;background:rgba(255,255,255,.04);padding:1px 5px;border-radius:3px;border:1px solid var(--border);}

  /* ===== Main ===== */
  .main{flex:1;display:flex;gap:0;min-height:0;}

  /* ===== Left Panel ===== */
  .panel-input{flex:1;background:var(--panel);display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border);min-width:0;}
  .panel-input .head{flex-shrink:0;padding:8px 16px;height:40px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--panel2);}
  .panel-input .head .label{font-size:9.5px;font-weight:700;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
  .head-actions{display:flex;gap:6px;align-items:center;}
  .btn{padding:5px 10px;border:1px solid var(--border);border-radius:4px;background:var(--panel);color:var(--dim);font-size:10px;font-family:var(--font-sys);cursor:pointer;transition:all .18s;font-weight:500;white-space:nowrap;}
  .btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(244,63,94,.05);}
  .panel-input textarea{flex:1;width:100%;border:none;outline:none;resize:none;font-family:var(--font-mono);font-size:11px;line-height:1.75;color:#c4c4cc;padding:14px 16px;background:transparent;tab-size:2;}
  .panel-input textarea::placeholder{color:#484850;font-family:var(--font-sys);font-size:12px;}

  /* Stats bar below head */
  .stats-bar{
    flex-shrink:0;display:flex;gap:16px;padding:6px 16px;
    border-bottom:1px solid rgba(255,255,255,.04);
    font-size:10px;color:var(--dim);
  }
  .stats-bar .stat{display:flex;align-items:center;gap:4px;}
  .stats-bar .stat .val{color:#a1a1aa;font-weight:600;}

  /* ===== Right Panel ===== */
  .panel-preview{
    flex:0 0 540px;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:0;padding:16px 24px 20px;position:relative;
    min-width:0;
    background:
      radial-gradient(ellipse 80% 40% at 50% 45%, rgba(255,255,255,.015) 0%, transparent 70%),
      radial-gradient(ellipse at center, rgba(20,20,26,.9) 0%, var(--bg) 70%);
  }

  /* ===== Phone Scene ===== */
  .phone-scene{
    flex:1;display:flex;align-items:center;justify-content:center;
    width:100%;min-height:0;
    filter:drop-shadow(0 25px 60px rgba(0,0,0,.5))
           drop-shadow(0 8px 16px rgba(0,0,0,.3));
    transition:filter .4s ease;
  }
  .phone-scene:hover{
    filter:drop-shadow(0 30px 70px rgba(0,0,0,.6))
           drop-shadow(0 12px 24px rgba(0,0,0,.4))
           drop-shadow(0 0 50px rgba(244,63,94,.04));
  }

  /* Phone body */
  .phone{
    position:relative;display:flex;flex-direction:column;
    width:402px;height:100%;border-radius:42px;padding:5px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.18) 0%, rgba(255,255,255,.06) 2%, rgba(255,255,255,.01) 5%, rgba(255,255,255,0) 10%, rgba(0,0,0,.02) 80%, rgba(0,0,0,.06) 92%, rgba(255,255,255,.02) 96%, rgba(255,255,255,.05) 100%),
      linear-gradient(90deg, rgba(255,255,255,.08) 0%, rgba(255,255,255,.02) 4%, rgba(255,255,255,0) 8%, rgba(255,255,255,0) 88%, rgba(0,0,0,.05) 94%, rgba(0,0,0,.08) 97%, rgba(255,255,255,.04) 100%),
      linear-gradient(175deg, #c8c2b8 0%,#d4cec4 3%,#cac4ba 8%,#b8b2a8 18%,#a8a298 30%,#9e9890 45%,#a29c94 55%,#b0aaa0 68%,#beb8ae 82%,#c6c0b6 92%,#c0bab0 100%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.07),inset 0 -1px 0 rgba(0,0,0,.15),0 0 0 .5px rgba(0,0,0,.25);
  }

  /* Screen */
  .screen{
    flex:1;display:flex;flex-direction:column;
    background:#fff;border-radius:37px;overflow:hidden;
    position:relative;z-index:1;
  }
  .screen::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:19;border-radius:37px;box-shadow:inset 0 0 0 .5px rgba(0,0,0,.06);}
  .screen::after{
    content:'';position:absolute;inset:0;pointer-events:none;z-index:3;border-radius:37px;
    background:linear-gradient(155deg, rgba(255,255,255,.15) 0%, rgba(255,255,255,.04) 3%, rgba(255,255,255,0) 7%, rgba(255,255,255,0) 55%, rgba(255,255,255,.01) 80%, rgba(255,255,255,.03) 100%),
               linear-gradient(0deg, rgba(0,0,0,.012) 0%, transparent 30%);
  }

  /* Dynamic Island */
  .dynamic-island{
    position:absolute;z-index:10;top:10px;left:50%;transform:translateX(-50%);
    width:116px;height:34px;background:#000;border-radius:20px;
    box-shadow:0 0 0 .5px rgba(120,120,130,.2);
  }
  .dynamic-island::after{content:'';position:absolute;right:13px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:#111128;box-shadow:inset 0 0 2px rgba(0,0,100,.3);}
  .speaker-slit{position:absolute;z-index:9;top:4px;left:50%;transform:translateX(-50%);width:50px;height:2px;background:#1a1a1a;border-radius:1px;opacity:.7;}

  /* Status bar */
  .statusbar{
    flex-shrink:0;z-index:5;padding:11px 24px 3px;
    font-size:10.5px;font-weight:600;color:#1a1a1a;
    display:flex;justify-content:space-between;
    font-family:-apple-system,'SF Pro Text',sans-serif;letter-spacing:-.3px;
  }

  /* Content */
  .content{
    flex:1;overflow-y:auto;overflow-x:hidden;
    padding:0;position:relative;z-index:2;min-height:0;
    -webkit-overflow-scrolling:touch;scroll-behavior:smooth;
  }
  .content::-webkit-scrollbar{width:3px;}
  .content::-webkit-scrollbar-track{background:transparent;}
  .content::-webkit-scrollbar-thumb{background:rgba(0,0,0,.08);border-radius:2px;}
  .content::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.15);}

  .scroll-fade{
    position:absolute;bottom:0;left:0;right:0;z-index:6;
    height:32px;pointer-events:none;
    background:linear-gradient(0deg,rgba(255,255,255,.9) 0%,rgba(255,255,255,0) 100%);
    opacity:0;transition:opacity .3s;
  }
  .scroll-fade.on{opacity:1;}

  .homebar{
    flex-shrink:0;height:20px;z-index:5;
    display:flex;align-items:flex-start;justify-content:center;
  }
  .homebar::after{content:'';width:134px;height:4px;background:#1a1a1a;border-radius:2px;opacity:.12;}

  /* Side buttons */
  .sbtn{
    position:absolute;pointer-events:none;z-index:0;
    background:linear-gradient(180deg, rgba(255,255,255,.15) 0%, #c4beb4 15%,#b0aaa0 40%, #a09a90 60%,#b8b2a8 85%, rgba(255,255,255,.08) 100%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 1px 3px rgba(0,0,0,.35),0 0 0 .5px rgba(0,0,0,.2);
  }

  /* USB-C */
  .usbc-port{position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:22px;height:3px;background:#1a1a1a;border-radius:2px;z-index:0;}
  .spkr-hole{position:absolute;bottom:0;z-index:0;width:2px;height:2px;border-radius:50%;background:#1a1a1a;opacity:.5;}
  .antenna{position:absolute;pointer-events:none;z-index:0;background:rgba(0,0,0,.12);}

  /* ===== Empty state ===== */
  .empty-state{
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;height:100%;text-align:center;
    padding:50px 30px;user-select:none;
  }
  .empty-state .ph-icon{width:56px;height:56px;border-radius:14px;background:rgba(0,0,0,.025);display:flex;align-items:center;justify-content:center;margin-bottom:20px;animation:pulse 2.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.4;}50%{transform:scale(1.06);opacity:.7;}}
  .empty-state .ph-icon svg{width:26px;height:26px;color:#bbb;}
  .empty-state h3{font-size:14px;font-weight:600;color:#666;margin:0 0 6px;}
  .empty-state p{font-size:11px;color:#aaa;line-height:1.8;margin:0;max-width:240px;}
  .empty-state .sht{font-size:10px;color:#ccc;border:1px dashed #ddd;padding:6px 14px;border-radius:20px;margin-top:18px;}

  /* ===== Copy button (topbar) ===== */
  .copy-btn{
    padding:6px 16px;border:none;border-radius:6px;
    background:var(--accent);color:#fff;
    font-size:11px;font-weight:700;font-family:var(--font-sys);
    letter-spacing:.4px;cursor:pointer;
    box-shadow:0 2px 10px rgba(244,63,94,.3);
    transition:all .2s ease;position:relative;overflow:hidden;white-space:nowrap;
  }
  .copy-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 60%);pointer-events:none;}
  .copy-btn:hover{background:#e11d48;box-shadow:0 4px 16px rgba(244,63,94,.45),0 0 0 3px rgba(244,63,94,.06);transform:translateY(-1px);}
  .copy-btn:active{transform:translateY(0);}
  .copy-btn:disabled{background:#33333a;cursor:not-allowed;box-shadow:none;color:#6b6b75;}
  .copy-btn:disabled::before{display:none;}
  .copy-btn:disabled:hover{transform:none;background:#33333a;}
  .copy-status{font-size:10px;color:#22c55e;letter-spacing:.3px;transition:all .3s;}

  /* ===== Drag overlay ===== */
  .drag-overlay{
    position:fixed;inset:0;z-index:200;
    background:rgba(9,9,11,.85);backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity .2s;
  }
  .drag-overlay.show{opacity:1;pointer-events:auto;}
  .drag-overlay .inner{
    text-align:center;
    border:2px dashed var(--accent);border-radius:16px;
    padding:48px 64px;
  }
  .drag-overlay .inner .icon{font-size:40px;margin-bottom:12px;}
  .drag-overlay .inner p{font-size:14px;color:var(--dim);margin:0;}

  /* ===== Dark mode toggle ===== */
  .dark-toggle{
    padding:4px 10px;border:1px solid var(--border);border-radius:4px;
    background:var(--panel);color:var(--dim);font-size:11px;
    font-family:var(--font-sys);cursor:pointer;transition:all .18s;
    white-space:nowrap;
  }
  .dark-toggle:hover{border-color:#fbbf24;color:#fbbf24;}
  .dark-toggle.active{border-color:#fbbf24;color:#fbbf24;background:rgba(251,191,36,.08);}

  /* Dark mode — screen background simulates WeChat dark mode */
  .screen.dark{background:#191919;}
  .screen.dark::after{
    background:linear-gradient(155deg, rgba(255,255,255,.05) 0%, rgba(255,255,255,.01) 3%, transparent 7%, transparent 55%, rgba(255,255,255,.01) 80%, rgba(255,255,255,.02) 100%),
               linear-gradient(0deg, rgba(0,0,0,.03) 0%, transparent 30%);
  }
  .screen.dark .statusbar{color:#e4e4e4;}
  .screen.dark .scroll-fade{background:linear-gradient(0deg, rgba(25,25,25,.92) 0%, rgba(25,25,25,0) 100%);}

  /* ===== Image placeholder ===== */
  .img-placeholder{
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#f0f0f0,#e8e8e8);
    border:1px dashed #d0d0d0;border-radius:6px;
    min-height:60px;text-align:center;padding:16px;
    box-sizing:border-box;max-width:100%!important;
  }
  .img-placeholder span{font-size:10px;color:#999;letter-spacing:.5px;}

  /* Toast */
  .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(12px);padding:10px 26px;background:#1f1f28;color:#fff;font-size:13px;letter-spacing:.3px;border-radius:8px;border:1px solid var(--border);box-shadow:0 10px 32px rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:all .28s ease;z-index:100;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* Restore banner */
  .restore-banner{
    flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
    padding:6px 16px;background:rgba(244,63,94,.08);border-bottom:1px solid rgba(244,63,94,.15);
    font-size:10px;color:var(--dim);
  }
  .restore-banner button{
    padding:3px 10px;border:1px solid var(--accent);border-radius:3px;
    background:transparent;color:var(--accent);font-size:10px;
    font-family:var(--font-sys);cursor:pointer;font-weight:600;
    transition:all .15s;
  }
  .restore-banner button:hover{background:var(--accent);color:#fff;}
  .restore-banner .close{color:var(--dim);cursor:pointer;border:none;background:none;font-size:14px;padding:2px 6px;}

  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  @media(max-width:940px){
    body{overflow:auto;}
    .main{flex-direction:column;}
    .panel-input{min-height:300px;border-right:none;border-bottom:1px solid var(--border);}
    .panel-input textarea{min-height:200px;}
    .panel-preview{flex:0 0 auto;padding:16px;min-height:500px;}
    .topbar{padding:6px 12px;height:auto;flex-wrap:wrap;gap:8px;}
    .topbar-right .hint{display:none;}
  }
</style>
</head>
<body>

<!-- Drag overlay -->
<div class="drag-overlay" id="dragOverlay">
  <div class="inner">
    <div class="icon">&#x2B07;</div>
    <p>释放以加载 HTML 文件</p>
  </div>
</div>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">磨稿 · <span>grindraft</span> - Design</div>
    <div class="width-switch" id="widthSwitch">
      <button data-w="375">375 SE</button>
      <button data-w="390" class="active">390 Pro</button>
      <button data-w="414">414 Max</button>
    </div>
  </div>
  <div class="topbar-right">
    <button class="dark-toggle" id="btnDark" title="暗色模式">🌙</button>
    <span class="copy-status" id="copyStatus"></span>
    <button class="copy-btn" id="btnCopy" disabled>&#x2398; 复制到公众号</button>
    <span class="hint"><kbd>Ctrl</kbd>+<kbd>Enter</kbd></span>
  </div>
</div>

<div class="main">

  <!-- Left: HTML Input -->
  <div class="panel-input" id="panelInput">
    <div class="restore-banner" id="restoreBanner" style="display:none">
      <span>检测到上次编辑的内容</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <button id="btnRestore">恢复</button>
        <button class="close" id="btnDismissRestore">&times;</button>
      </div>
    </div>
    <div class="head">
      <span class="label">HTML 源码</span>
      <div class="head-actions">
        <button class="btn" id="btnFormat">格式化</button>
        <button class="btn" id="btnExample">加载示例</button>
        <button class="btn" id="btnClear">清空</button>
      </div>
    </div>
    <div class="stats-bar" id="statsBar">
      <div class="stat">汉字<span class="val" id="statChars">0</span></div>
      <div class="stat">阅读<span class="val" id="statRead">0 分钟</span></div>
      <div class="stat">段落<span class="val" id="statPara">0</span></div>
    </div>
    <textarea id="htmlSource" placeholder="在此粘贴 AI 排版生成的 HTML……&#10;&#10;快捷键：Ctrl+V 粘贴 · Ctrl+Enter 复制 · 拖拽 .html 文件加载&#10;&#10;支持自动识别剪贴板中的 HTML"></textarea>
  </div>

  <!-- Right: Phone Preview -->
  <div class="panel-preview">
    <div class="phone-scene">
      <div class="phone">
        <!-- Side buttons -->
        <div class="sbtn" style="right:-3px;top:145px;width:3px;height:56px;border-radius:2px;"></div>
        <div class="sbtn" style="left:-3px;top:136px;width:3px;height:38px;border-radius:2px;"></div>
        <div class="sbtn" style="left:-3px;top:184px;width:3px;height:38px;border-radius:2px;"></div>
        <div class="sbtn" style="left:-3px;top:112px;width:2.5px;height:18px;border-radius:1.5px;background:linear-gradient(180deg,rgba(255,255,255,.1),#c8b098 30%,#b8a088 60%,#c4ac94 85%,rgba(255,255,255,.05));"></div>
        <div class="sbtn" style="right:-3px;top:215px;width:2.5px;height:18px;border-radius:1.5px;background:linear-gradient(180deg,rgba(255,255,255,.1),#d4c8bc 30%,#c8bcb0 60%,#d0c4b8 85%,rgba(255,255,255,.05));"></div>
        <!-- Antenna lines -->
        <div class="antenna" style="top:58px;left:-2px;width:10px;height:1px;"></div>
        <div class="antenna" style="top:58px;right:-2px;width:10px;height:1px;"></div>
        <div class="antenna" style="bottom:68px;left:-2px;width:10px;height:1px;"></div>
        <div class="antenna" style="bottom:68px;right:-2px;width:10px;height:1px;"></div>
        <!-- Screen -->
        <div class="screen">
          <div class="speaker-slit"></div>
          <div class="dynamic-island"></div>
          <div class="statusbar"><span id="timeLabel">9:41</span><span style="font-size:9.5px;letter-spacing:-1px">▮▮▮▮ &nbsp;⋮⋮⋮⋮</span></div>
          <div class="content" id="content">
            <div class="empty-state"><div class="ph-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01" stroke-width="2.5"/></svg></div><h3>准备预览</h3><p>在左侧面板粘贴公众号 HTML<br/>或拖拽 .html 文件至此</p><div class="sht">Ctrl+V 粘贴 HTML</div></div>
          </div>
          <div class="scroll-fade" id="scrollFade"></div>
          <div class="homebar"></div>
        </div>
        <div class="usbc-port"></div>
        <div class="spkr-hole" style="left:calc(50% + 16px);"></div><div class="spkr-hole" style="left:calc(50% + 20px);"></div><div class="spkr-hole" style="left:calc(50% + 24px);"></div>
        <div class="spkr-hole" style="left:calc(50% - 16px);"></div><div class="spkr-hole" style="left:calc(50% - 20px);"></div><div class="spkr-hole" style="left:calc(50% - 24px);"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'grindraft_html_backup';
const STORAGE_TS_KEY = 'grindraft_html_ts';
const WIDTH_KEY = 'grindraft_width';

const htmlSource = document.getElementById('htmlSource');
const contentEl  = document.getElementById('content');
const scrollFade = document.getElementById('scrollFade');
const btnCopy    = document.getElementById('btnCopy');
const copyStatus = document.getElementById('copyStatus');
const timeLabel  = document.getElementById('timeLabel');
const toastEl    = document.getElementById('toast');
const dragOverlay= document.getElementById('dragOverlay');
const restoreBanner = document.getElementById('restoreBanner');
const statsBar   = document.getElementById('statsBar');

let currentWidth = parseInt(localStorage.getItem(WIDTH_KEY) || '390');

/* =================================================================
   1. CONTENT WIDTH SWITCHING
   Changes only the inner content max-width, phone model unchanged
   ================================================================= */
function applyWidth(w) {
  currentWidth = w;
  localStorage.setItem(WIDTH_KEY, w);
  renderContent();
}

document.getElementById('widthSwitch').addEventListener('click', function(e){
  var b = e.target.closest('button');
  if (!b) return;
  var w = parseInt(b.dataset.w);
  if (w === currentWidth) return;
  this.querySelectorAll('button').forEach(function(x){ x.classList.remove('active'); });
  b.classList.add('active');
  applyWidth(w);
});

// Init width switch from localStorage
(function(){
  var btn = document.querySelector('[data-w="'+currentWidth+'"]');
  if (btn) {
    document.querySelectorAll('#widthSwitch button').forEach(function(x){ x.classList.remove('active'); });
    btn.classList.add('active');
  }
})();

/* =================================================================
   2. AUTO-SAVE / RESTORE (localStorage)
   Saves on every input (debounced 500ms). Restores on load.
   ================================================================= */
let saveTimer;
function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    var v = htmlSource.value;
    if (v.trim()) {
      localStorage.setItem(STORAGE_KEY, v);
      localStorage.setItem(STORAGE_TS_KEY, Date.now());
    }
  }, 500);
}

// Check for saved content on load
(function(){
  var saved = localStorage.getItem(STORAGE_KEY);
  var ts = localStorage.getItem(STORAGE_TS_KEY);
  if (saved && ts) {
    var age = Date.now() - parseInt(ts);
    // Only show restore for content < 24h old
    if (age < 86400000) {
      restoreBanner.style.display = 'flex';
      document.getElementById('btnRestore').addEventListener('click', function(){
        htmlSource.value = saved;
        restoreBanner.style.display = 'none';
        renderContent();
        showToast('已恢复上次内容');
      });
      document.getElementById('btnDismissRestore').addEventListener('click', function(){
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(STORAGE_TS_KEY);
        restoreBanner.style.display = 'none';
      });
    }
  }
})();

/* =================================================================
   3. DRAG & DROP .html file loading
   ================================================================= */
let dragCounter = 0;
document.addEventListener('dragenter', function(e){ e.preventDefault(); dragCounter++; if(dragCounter===1) dragOverlay.classList.add('show'); });
document.addEventListener('dragleave', function(e){ e.preventDefault(); dragCounter--; if(dragCounter===0) dragOverlay.classList.remove('show'); });
document.addEventListener('dragover', function(e){ e.preventDefault(); });
document.addEventListener('drop', function(e){
  e.preventDefault();
  dragCounter = 0;
  dragOverlay.classList.remove('show');
  var file = e.dataTransfer.files[0];
  if (file) {
    if (file.name.endsWith('.html') || file.name.endsWith('.htm') || file.type === 'text/html') {
      var reader = new FileReader();
      reader.onload = function(ev){
        htmlSource.value = ev.target.result;
        renderContent();
        showToast('已加载: ' + file.name);
      };
      reader.readAsText(file);
    } else {
      showToast('请拖入 .html 文件');
    }
  }
});

/* =================================================================
   4. ARTICLE STATISTICS
   Chinese chars, reading time (400 chars/min), paragraph count
   ================================================================= */
function updateStats() {
  var text = contentEl.textContent || '';
  // Count Chinese characters
  var chinese = (text.match(/[一-鿿㐀-䶿]/g) || []).length;
  // Count paragraphs (p tags, or section blocks with text)
  var paragraphs = contentEl.querySelectorAll('p').length || (text.split(/\n{2,}/).filter(function(l){ return l.trim().length > 10; }).length);
  // Reading time: Chinese ~400 chars/min + some buffer for reading
  var minutes = Math.max(1, Math.ceil(chinese / 400));

  document.getElementById('statChars').textContent = chinese;
  document.getElementById('statRead').textContent = minutes + ' 分钟';
  document.getElementById('statPara').textContent = paragraphs;

  if (chinese > 0) statsBar.style.opacity = '1';
  else statsBar.style.opacity = '.4';
}

/* =================================================================
   5. HTML FORMATTING
   Simple pretty-print: add newlines + indentation before opening tags
   ================================================================= */
function formatHTML(html) {
  // Remove leading/trailing whitespace
  html = html.trim();
  var result = '';
  var indent = 0;
  var i = 0;
  var len = html.length;

  while (i < len) {
    if (html[i] === '<') {
      // Check for closing tag
      if (html[i+1] === '/') {
        indent = Math.max(0, indent - 1);
        result += '\n' + '  '.repeat(indent);
        // Read the tag
        var j = i;
        while (j < len && html[j] !== '>') j++;
        result += html.substring(i, j+1);
        i = j + 1;
      }
      // Self-closing or void elements
      else if (/^<(img|br|input|hr|meta|link)[\s>]/i.test(html.substring(i))) {
        result += '\n' + '  '.repeat(indent);
        var j = i;
        while (j < len && html[j] !== '>') j++;
        result += html.substring(i, j+1);
        i = j + 1;
      }
      // Opening tag
      else {
        result += '\n' + '  '.repeat(indent);
        var j = i;
        while (j < len && html[j] !== '>') j++;
        var tag = html.substring(i, j+1);
        result += tag;
        i = j + 1;
        // Don't indent after inline tags
        if (!/^<(span|strong|em|br|img)\b/i.test(tag) && !/\/>$/.test(tag)) {
          indent++;
        }
      }
    }
    // Text content
    else {
      var j = i;
      while (j < len && html[j] !== '<') j++;
      var txt = html.substring(i, j);
      // Trim whitespace-only text nodes
      if (txt.trim()) {
        result += txt;
      }
      i = j;
    }
  }
  return result.trim();
}

document.getElementById('btnFormat').addEventListener('click', function(){
  if (!htmlSource.value.trim()) return;
  htmlSource.value = formatHTML(htmlSource.value);
  autoSave();
  showToast('HTML 已格式化 ✓');
});

function getEmptyHTML(){
  return '<div class="empty-state"><div class="ph-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01" stroke-width="2.5"/></svg></div><h3>准备预览</h3><p>在左侧面板粘贴公众号 HTML<br/>或拖拽 .html 文件至此</p><div class="sht">Ctrl+V 粘贴 HTML</div></div>';
}

function updateScrollFade(){
  var has = contentEl.scrollHeight > contentEl.clientHeight + 2;
  var atBottom = contentEl.scrollTop + contentEl.clientHeight >= contentEl.scrollHeight - 8;
  scrollFade.classList.toggle('on', has && !atBottom);
}

function renderContent(){
  var h = htmlSource.value.trim();
  if (h) {
    h = h.replace(/(max-width:\s*)\d+(px)/g, '$1'+currentWidth+'$2');
    if (!/max-width/.test(h)) {
      h = h.replace(/^(<section\s[^>]*style=")/, '$1max-width:'+currentWidth+'px;');
    }
    contentEl.innerHTML = h;
    fixImagePlaceholders();
  } else {
    contentEl.innerHTML = getEmptyHTML();
  }
  btnCopy.disabled = !h;
  copyStatus.textContent = '';
  scrollFade.classList.remove('on');
  requestAnimationFrame(function(){
    updateScrollFade();
    updateStats();
  });
}

/* ---- Image placeholder detection ---- */
function fixImagePlaceholders(){
  var imgs = contentEl.querySelectorAll('img');
  imgs.forEach(function(img){
    var src = img.getAttribute('src') || '';
    // Check if src looks like a local path or placeholder
    if (!src || src.startsWith('./') || src.startsWith('../') || src.startsWith('file://') || src === '#' || /^(image|img|pic|photo)\b/i.test(src)) {
      var wrapper = document.createElement('section');
      wrapper.className = 'img-placeholder';
      wrapper.innerHTML = '<span>▲ 替换为公众号素材链接</span>';
      wrapper.style.width = (img.style.width || img.getAttribute('width') || '100%');
      wrapper.style.height = (img.style.height || img.getAttribute('height') || 'auto');
      if (img.parentElement) img.parentElement.replaceChild(wrapper, img);
    }
  });
}

/* ---- Dark mode toggle ---- */

document.getElementById('btnDark').addEventListener('click', function(){
  isDark = !isDark;
  var screen = document.querySelector('.screen');

});

htmlSource.addEventListener('input', function(){

contentEl.addEventListener('scroll', updateScrollFade);

// Paste detection
document.addEventListener('paste', function(e){
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  var h = e.clipboardData.getData('text/html') || e.clipboardData.getData('text/plain');
  if (h && /<section/i.test(h)) { e.preventDefault(); htmlSource.value = h; renderContent(); autoSave(); showToast('已识别 HTML · 预览已更新'); }
});

function copyToWechat(){
    var h = htmlSource.value.trim();
    if (!h) { showToast('请先粘贴 HTML 内容'); return; }
    // 包裹白色背景层，避免微信编辑器默认黑底
    var raw = '<section style="background:#fff;box-sizing:border-box;max-width:100%!important;padding:0 6px">'+h+'</section>';
    // 方法1：Clipboard API（仅 HTTPS/localhost 生效）
    if (window.isSecureContext && navigator.clipboard && navigator.clipboard.write) {
      try {
        var htmlBlob = new Blob([raw], {type:'text/html'});
        var textBlob = new Blob([h.replace(/<[^>]+>/g,' ')], {type:'text/plain'});
        navigator.clipboard.write([new ClipboardItem({'text/html':htmlBlob,'text/plain':textBlob})]).then(function(){
          copyStatus.textContent = '✓ 已复制';
          showToast('已复制到剪贴板 · 公众号后台 Ctrl+V 粘贴');
          setTimeout(function(){ copyStatus.textContent = ''; }, 3000);
        }, function(){ fallbackCopy(raw, h); });
        return;
      } catch(e){ /* fall through */ }
    }
    fallbackCopy(raw, h);
  }
  function fallbackCopy(raw, plainBase){
    var tmp = document.createElement('div');
    tmp.contentEditable = 'true';
    tmp.style.cssText = 'position:fixed;left:-9999px;top:-999px;width:375px;height:auto;';
    tmp.innerHTML = raw;
    document.body.appendChild(tmp);
    var range = document.createRange(); range.selectNodeContents(tmp);
    var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
    // 不 preventDefault（防止 setData 失败后剪贴板为空）
    // 尝试写入原始 HTML 字符串，若浏览器不支持则用默认序列化 DOM 兜底
    var handler = function(e){
      try{ e.clipboardData.setData('text/html', raw); }catch(ex){}
      document.removeEventListener('copy', handler, true);
    };
    document.addEventListener('copy', handler, true);
    var ok = false;
    try{ ok = document.execCommand('copy'); }catch(ex){ ok = false; }
    sel.removeAllRanges(); document.body.removeChild(tmp);
    document.removeEventListener('copy', handler, true);
    if(ok){
      copyStatus.textContent = '✓ 已复制';
      showToast('已复制到剪贴板 · 公众号后台 Ctrl+V 粘贴');
      setTimeout(function(){ copyStatus.textContent = ''; }, 3000);
    } else {
      showToast('复制失败，请手动全选后 Ctrl+C');
    }
  }
btnCopy.addEventListener('click', copyToWechat);
document.addEventListener('keydown', function(e){ if ((e.ctrlKey||e.metaKey)&&e.key==='Enter'){ e.preventDefault(); if (!btnCopy.disabled) copyToWechat(); } });
